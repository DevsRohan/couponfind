<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — CouponFind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="glass" style="width:248px;flex:none;border-top:none;border-bottom:none;border-left:none;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;">
      <div class="px-5 h-16 flex items-center gap-2 border-b hairline">
        <span style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#ffb27a);display:flex;align-items:center;justify-content:center;font-weight:900;color:#1a0f04;">C</span>
        <span class="font-extrabold">CouponFind</span>
      </div>
      <nav id="nav" class="p-3 grid gap-1" style="flex:1;overflow-y:auto;"></nav>
      <div class="p-3 border-t hairline">
        <button onclick="UI.openCmdk()" class="nav-item w-full" style="justify-content:space-between;">
          <span class="flex items-center gap-2"><span style="width:18px;height:18px;display:inline-flex;" id="cmd-ico"></span> Quick actions</span>
          <span class="badge badge-muted">⌘K</span>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main style="flex:1;min-width:0;">
      <header class="glass flex items-center justify-between px-6 h-16" style="position:sticky;top:0;z-index:30;border-left:none;border-right:none;border-top:none;">
        <div class="flex items-center gap-3" style="flex:1;max-width:520px;">
          <span style="width:18px;color:var(--muted);" id="hdr-search-ico"></span>
          <input id="global-search" class="input" placeholder="Search coupons… (Enter)" style="border:none;background:transparent;" />
        </div>
        <div class="flex items-center gap-3">
          <button id="bell" class="btn btn-ghost btn-sm" style="position:relative;"><span style="width:18px;height:18px;display:inline-flex;" id="bell-ico"></span><span id="bell-dot" class="hide" style="position:absolute;top:6px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--accent);"></span></button>
          <div class="flex items-center gap-2">
            <span id="avatar" style="width:32px;height:32px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;"></span>
            <div class="hidden md:block" style="line-height:1.1;">
              <div id="user-name" class="text-sm font-semibold"></div>
              <div id="user-plan" class="text-xs text-muted"></div>
            </div>
          </div>
          <button id="logout" class="btn btn-ghost btn-sm"><span style="width:16px;height:16px;display:inline-flex;" id="logout-ico"></span></button>
        </div>
      </header>

      <div id="view" class="p-6 max-w-6xl mx-auto"></div>
    </main>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
