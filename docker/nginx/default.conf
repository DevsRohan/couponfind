server {
    listen 80;
    server_name _;
    charset utf-8;

    # ----- Frontend (static SPA pages + assets) -----
    root /var/www/frontend;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----- API -> PHP front controller -----
    location /api/ {
        root /var/www/backend/public;
        try_files $uri /index.php$is_args$args;
    }

    location = /index.php {
        root /var/www/backend/public;
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
    }

    location ~ ^/index\.php {
        root /var/www/backend/public;
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
    }

    # Static frontend assets + page fallbacks
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
