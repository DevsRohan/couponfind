services:
  mysql:
    image: mysql:8.0
    container_name: cf_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-couponfind}
      MYSQL_USER: ${DB_USERNAME:-couponfind}
      MYSQL_PASSWORD: ${DB_PASSWORD:-couponfind_secret}
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      # NOTE: the MySQL entrypoint only runs *files* directly in this dir (it does
      # NOT recurse into subdirectories) — so mount each .sql file individually,
      # named to control execution order (schema before seeds).
      - ./database/migrations/001_init_schema.sql:/docker-entrypoint-initdb.d/10_schema.sql:ro
      - ./database/seeds/001_seed.sql:/docker-entrypoint-initdb.d/20_seed.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cf_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: cf_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-me-meili-master-key}
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cf_php
    restart: unless-stopped
    working_dir: /var/www/backend
    # Ensure the PSR-4 autoloader exists even on a fresh checkout (the bind
    # mount below shadows the image's vendor/). Then run php-fpm.
    command: sh -c "[ -f vendor/autoload.php ] || composer dump-autoload --optimize --no-interaction; php-fpm"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/backend
      - ./frontend:/var/www/frontend

  nginx:
    image: nginx:1.27-alpine
    container_name: cf_nginx
    restart: unless-stopped
    depends_on:
      - php
    volumes:
      - ./backend:/var/www/backend:ro
      - ./frontend:/var/www/frontend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT:-8080}:80"

  engine:
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    container_name: cf_engine
    restart: unless-stopped
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    volumes:
      - ./engine:/app
    # Runs the scheduler loop: discovery -> pipeline -> sync on intervals
    command: ["python", "cli.py", "schedule"]

volumes:
  mysql_data:
  redis_data:
  meili_data:
